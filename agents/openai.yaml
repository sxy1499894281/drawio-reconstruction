interface:
  display_name: "Draw.io Slide Reconstruction"
  short_description: "Rebuild images into Draw.io with visual-fidelity audits, editable structure, and faithful crops"
  default_prompt: "Use $drawio-slide-reconstruction to reconstruct this diagram image or image folder into editable Draw.io files with PNG previews. For folders or any request with 2+ images, use multi-agent parallel reconstruction by default. Prioritize visual fidelity over generic editability. Keep text and structure editable, but use SVG/native only when the icon can match the reference shape and style; use code-assisted cropped/transparent PNGs for complex, style-specific, scene-like, real UI, dense thumbnail, person, and visual-metaphor elements; clean or match crop backgrounds when needed. Perform a full reference inventory and visual audit before final delivery."
